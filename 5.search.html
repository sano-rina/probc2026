<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>検索画面</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f4f8fc;
    }

    .main-box {
      background-color: white;
      border-radius: 15px;
      padding: 30px;
      margin-top: 40px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .title {
      color: #0d6efd;
      font-weight: bold;
      margin-bottom: 25px;
    }

    footer {
      background-color: #0d6efd;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 50px;
    }

    .btn-search {
      width: 120px;
    }

    table {
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <!-- ヘッダー -->
  <nav class="navbar navbar-dark bg-primary">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">
        拾得物届出・管理システム
      </span>
    </div>
  </nav>

  <!-- メイン -->
  <div class="container">

    <div class="main-box">

      <h2 class="title">拾得物検索</h2>

      <!-- 検索フォーム -->
      <div class="row g-3">

        <div class="col-md-4">
          <label class="form-label">拾得物名</label>
          <input type="text" class="form-control" placeholder="例：財布">
        </div>

        <div class="col-md-4">
          <label class="form-label">カテゴリー</label>
          <select class="form-select">
            <option>選択してください</option>
            <option>財布</option>
            <option>スマートフォン</option>
            <option>鍵</option>
            <option>その他</option>
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label">拾得日</label>
          <input type="date" class="form-control">
        </div>

      </div>

      <!-- ボタン -->
      <div class="mt-4 text-center">
        <button class="btn btn-primary btn-search">
          検索
        </button>

        <button class="btn btn-secondary btn-search">
          リセット
        </button>
      </div>

      <!-- 検索結果 -->
      <table class="table table-bordered table-hover text-center">

        <thead class="table-primary">
          <tr>
            <th>ID</th>
            <th>拾得物名</th>
            <th>カテゴリー</th>
            <th>拾得日</th>
            <th>状態</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>001</td>
            <td>黒い財布</td>
            <td>財布</td>
            <td>2026/05/28</td>
            <td>保管中</td>
          </tr>

          <tr>
            <td>002</td>
            <td>iPhone</td>
            <td>スマートフォン</td>
            <td>2026/05/27</td>
            <td>返却済</td>
          </tr>
        </tbody>

      </table>

    </div>

  </div>

  <!-- フッター -->
  <footer>
    © 2026 拾得物届出・管理システム
  </footer>

</body>
</html>
    <div class="container mt-4 mb-5">
      <a href="index.html" class="btn btn-outline-success">
        <i class="bi bi-arrow-left-circle me-1"></i>
        トップページに戻る
      </a>
    </div>
  </main>
  <!-- ここからページ下部のフッタ部 -->
    <footer class="fixed-bottom bg-success text-light text-end">
      <div>文教大学 情報学部 情報システム学科 プロジェクト演習BC</div>
    </footer>

  </body>
</html>
