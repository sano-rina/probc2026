          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="item-list.html" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">拾得物登録機能</a>
                <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                  <li><a class="dropdown-item" href="#">拾得者（ユーザ）登録  <i class="bi bi-person"></i></a></i></li>

    <!-- ここまでページ上部のヘッダ部 -->

    <!-- ここからページのメインコンテンツ -->
    <main>
      <form action="6.info_registration.html" method="get">
        
        <div class="container mt-5 mb-5">
          <div class="card shadow">

            <div class="card-header bg-primary text-white">
              <h2 class="mb-0">拾得物届出・管理システム</h2>
            </div>

            <div class="card-body">

              <div class="text-center mb-5">
                <h4>
                  <strong class="fw-bold text-success">情報入力</strong>
                  　／　確認　／　完了
                </h4>
              </div>

              <div class="row">

                <div class="col-md-7">
                  <div class="mb-4">
                    <label for="userId" class="form-label fw-bold fs-4">
                      ・拾得者ID
                      <span class="badge bg-danger fs-6 align-middle">必須</span>
                    </label>

                    <input type="text"
                      class="form-control form-control-lg"
                      id="userId"
                      name="userId"
                      placeholder="例：U000123"
                      required>

                    <div class="form-text">
                      ユーザ登録時に発行されたIDを入力してください
                    </div>
                  </div>

                  <div class="mb-4">
                    <label for="itemCategory" class="form-label fw-bold fs-4">
                      ・種類 <span class="badge bg-danger fs-6 align-middle">必須</span>
                    </label>
                    <input type="text" 
                           class="form-control form-control-lg" 
                           id="itemCategory" 
                           placeholder="例：財布、学生証、鍵 など" 
                           required>
                  </div>

                  <div class="mb-4">
                    <label for="itemFeatures" class="form-label fw-bold fs-4">
                      ・特徴 <span class="badge bg-danger fs-6 align-middle">必須</span>
                    </label>
                    <textarea class="form-control" 
                              id="itemFeatures" 
                              rows="6" 
                              placeholder="例：黒色の革製、〇〇のブランドロゴ入り、青いキーホルダー付き" 
                              required></textarea>
                  </div>

                </div>

                <div class="col-md-5 text-center">

                  <div class="border p-5 bg-light mb-4 rounded">
                    <h2>写真</h2>
                    <p class="fs-4 text-muted">（任意）</p>
                    <input type="file" class="form-control mt-3" accept="image/*">
                  </div>

                  <div class="d-flex justify-content-center gap-3">
                    <button type="reset" class="btn btn-secondary btn-lg">
                      出力をクリア
                    </button>
                    <button type="submit" class="btn bg-success text-white btn-lg">
                      確認画面へ <i class="bi bi-arrow-right"></i>
                    </button>
                  </div>

                </div>

              </div>

            </div>
          </div>
        </div>

        <div class="container mt-4 mb-5">
        <a href="1.index.html" class="btn btn-outline-success">
          <i class="bi bi-arrow-left-circle me-1"></i>
        トップページに戻る
        </a>
      </div>

      </form>
    </main>

    <footer class="fixed-bottom bg-success text-light text-end py-1 pe-3">
      <div><small>文教大学 情報学部 情報システム学科 プロジェクト演習BC</small></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
