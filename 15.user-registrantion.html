<!doctype html>
<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ユーザ登録</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
body{
    background:#f8f9fa;
}

main{
    padding-bottom:80px;
}

.progress-step{
    font-size:1.5rem;
}

footer{
    padding:8px 15px;
}
</style>
</head>

<body>

<!-- ヘッダー -->
  <header>
    <nav class="navbar navbar-expand-lg bg-success navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="1.index.html">
          <i class="bi bi-search"></i> 拾得物管理システム
        </a>

        <button class="navbar-toggler" type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
          id="navbarSupportedContent">

          <ul class="navbar-nav me-auto mb-2 mb-lg-0">

            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle"
                href="#"
                data-bs-toggle="dropdown">
                拾得物登録機能
              </a>

              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" href="15.user-registrantion.html">
                    拾得者（ユーザ）登録
                    <i class="bi bi-person"></i>
                  </a>
                </li>

                <li>
                  <a class="dropdown-item" href="3.item_registration.html">
                    拾得物登録
                    <i class="bi bi-file-earmark-arrow-up"></i>
                  </a>
                </li>
              </ul>
            </li>

            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle"
                href="#"
                data-bs-toggle="dropdown">
                拾得物検索機能
              </a>

              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" href="5.search.html">
                    拾得物検索
                    <i class="bi bi-search"></i>
                  </a>
                </li>

                <li>
                  <a class="dropdown-item"
                    href="13.lost_request.html">
                    遺失物捜索依頼申請
                    <i class="bi bi-file-earmark-check"></i>
                  </a>
                </li>
              </ul>
            </li>

          </ul>

          <a href="4.administrator_login.html" class="btn btn-light ms-auto">
            <i class="bi bi-person-lock"></i>
            管理者ログイン
          </a>

        </div>
      </div>
    </nav>
  </header>

  <!-- メイン -->
  <main>

  <div class="container mt-5">

    <!-- 進捗表示 -->
    <div class="text-center mb-5">

      <div class="d-flex justify-content-center align-items-center gap-3 progress-step">

        <span class="fw-bold text-dark">
          情報入力
        </span>

        <span>／</span>

        <span class="text-secondary">
          確認
        </span>

        <span>／</span>

        <span class="text-secondary">
         完了
        </span>

      </div>

    </div>

    <h2 class="mb-4">
      ユーザ登録
    </h2>

    <form action="14.lost_request_confirm.html">

      <div class="mb-3">
        <label class="form-label">氏名</label>
        <input type="text" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">Gmail</label>
        <input type="email" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">学年</label>
        <select class="form-select">
          <option>1年</option>
          <option>2年</option>
          <option>3年</option>
          <option>4年</option>
          <option>その他</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">登録区分</label>
        <div class="form-check">
          <input class="form-check-input"
            type="radio"
            name="userType"
            id="finder"
            value="拾得者"
            checked>
            <label class="form-check-label" for="finder">
              拾得者として登録
            </label>
        </div>

        <div class="form-check">
          <input class="form-check-input"
            type="radio"
            name="userType"
            id="loser"
            value="遺失者">
          <label class="form-check-label" for="loser">
            遺失者として登録
          </label>
        </div>
      </div>
    </form>

    
    <div class="text-center">
      <a href="16.user-registrantion_che.html" class="btn btn-success btn-lg">
        確認画面へ
      </a>
    </div>



  </main>
    <!-- ここからページ下部のフッタ部 -->
  <footer class="fixed-bottom bg-success text-light text-end">
    <div>文教大学 情報学部 情報システム学科 プロジェクト演習BC</div>
  </footer>
  <!-- ここまでページ下部のフッタ部 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
