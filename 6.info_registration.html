<!doctype html>
<html lang="ja">
  <head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>拾得物管理システム</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  </head>

  <body class="bg-light">

    <!-- ヘッダー -->
    <header>

      <nav class="navbar navbar-expand-lg bg-success navbar-dark">

        <div class="container-fluid">

          <a class="navbar-brand" href="1.index.html">

            <i class="bi bi-search"></i>
            拾得物管理システム

          </a>

          <button class="navbar-toggler"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#navbarSupportedContent">

            <span class="navbar-toggler-icon"></span>

          </button>

          <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

              <!-- 拾得物登録 -->
              <li class="nav-item dropdown">

                <a class="nav-link dropdown-toggle"
                   href="#"
                   role="button"
                   data-bs-toggle="dropdown">

                  拾得物登録機能

                </a>

                <ul class="dropdown-menu">

                  <li>

                    <a class="dropdown-item" href="#">

                      拾得者（ユーザ）登録
                      <i class="bi bi-person"></i>

                    </a>

                  </li>

                  <li>

                    <a class="dropdown-item" href="#">

                      拾得物登録
                      <i class="bi bi-file-earmark-arrow-up"></i>

                    </a>

                  </li>

                </ul>

              </li>

            </ul>

          </div>

        </div>

      </nav>

    </header>

    <!-- メイン -->
    <main>

      <div class="container mt-5 mb-5">

        <div class="card shadow">

          <!-- タイトル -->
          <div class="card-header bg-primary text-white">

            <h2 class="mb-0">

              拾得物届出・管理システム

            </h2>

          </div>

          <!-- 内容 -->
          <div class="card-body">

            <!-- ステップ -->
            <div class="text-center mb-5">

              <h4>

                情報入力　
                ／　
                <strong class="fw-bold">確認</strong>
                ／　
                完了

              </h4>

            </div>

            <div class="row">

              <!-- 左 -->
              <div class="col-md-7">

                <!-- 種類 -->
                <div class="mb-4">

                  <label class="form-label fw-bold fs-4">

                    ・種類

                  </label>

                  <input type="text"
                         class="form-control form-control-lg">

                </div>

                <!-- 特徴 -->
                <div class="mb-4">

                  <label class="form-label fw-bold fs-4">

                    ・特徴

                  </label>

                  <textarea class="form-control"
                            rows="6"></textarea>

                </div>

              </div>

              <!-- 右 -->
              <div class="col-md-5 text-center">

                <div class="border p-5 bg-light mb-4">

                  <h2>

                    写真

                  </h2>

                  <p class="fs-4">

                    （任意）

                  </p>

                  <input type="file"
                         class="form-control mt-3">

                </div>

                <!-- ボタン -->
                <div class="d-flex justify-content-center gap-3">

                  <!-- 編集 -->
                  <button class="btn btn-secondary btn-lg">

                    編集

                  </button>

                  <!-- 登録 -->
                  <button class="btn btn-primary btn-lg">

                    登録

                  </button>

                </div>

              </div>

            </div>

          </div>

        </div>

      </div>

      <!-- 戻るボタン -->
      <div class="container mb-5">

        <a href="1.index.html"
           class="btn btn-outline-secondary btn-lg">

          ←戻る

        </a>

      </div>

    </main>

    <!-- ここからページ下部のフッタ部 -->
    <footer class="fixed-bottom bg-success text-light text-end">
      <div>文教大学 情報学部 情報システム学科 プロジェクト演習BC</div>
    </footer>
    <!-- ここまでページ下部のフッタ部 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>

</html>
