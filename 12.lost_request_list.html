<!doctype html>
<html lang="ja">
<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>遺失物捜索依頼一覧</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

  <!-- ヘッダー -->
  <header>

    <nav class="navbar navbar-expand-lg bg-success navbar-dark">

      <div class="container-fluid">

        <a class="navbar-brand" href="/">

          <i class="bi bi-search"></i>
          拾得物管理システム

        </a>

      </div>

    </nav>

  </header>

  <!-- メイン -->
  <main>

    <div class="container mt-5 mb-5">

      <div class="card shadow">

        <div class="card-header bg-primary text-white">

          <h2 class="mb-0">

            遺失物捜索依頼一覧

          </h2>

        </div>

        <div class="card-body">

          <!-- 検索 -->
          <div class="row mb-4">

            <div class="col-md-5">

              <input
                type="text"
                id="keyword"
                class="form-control"
                placeholder="氏名・特徴で検索">

            </div>

            <div class="col-md-4">

              <select
                id="category"
                class="form-select">

                <option value="">すべての種類</option>

                <option value="財布">財布</option>
                <option value="スマートフォン">スマートフォン</option>
                <option value="鍵">鍵</option>
                <option value="その他">その他</option>

              </select>

            </div>

            <div class="col-md-3">

              <button
                class="btn btn-success w-100"
                onclick="searchRequest()">

                <i class="bi bi-search"></i>
                検索

              </button>

            </div>

          </div>

          <!-- 一覧 -->
          <div class="row">

            {% for item in requests %}

            <div class="col-md-4 mb-4 request-card"
                 data-name="{{ item.氏名 }}"
                 data-category="{{ item.分類名 }}"
                 data-feature="{{ item.特徴 }}">

              <div class="card h-100 shadow-sm">

                <div class="card-body">

                  <div class="border rounded text-center p-4 mb-3">

                    <i class="bi bi-image fs-1"></i>

                    <p class="mt-2 mb-0">
                      写真
                    </p>

                  </div>

                  <p>
                    <strong>氏名：</strong>
                    {{ item.氏名 }}
                  </p>

                  <p>
                    <strong>学部：</strong>
                    {{ item.学部 }}
                  </p>

                  <p>
                    <strong>遺失物の種類：</strong>
                    {{ item.分類名 }}
                  </p>

                  <p>
                    <strong>紛失日：</strong>
                    {{ item.遺失日時 }}
                  </p>

                  <p>
                    <strong>特徴：</strong>
                    {{ item.特徴 }}
                  </p>

                  <div class="text-center">

                    <a href="#"
                       class="btn btn-primary">

                      詳細

                    </a>

                  </div>

                </div>

              </div>

            </div>

            {% endfor %}

          </div>

        </div>

      </div>

    </div>

    <!-- 戻る -->
    <div class="container mb-5">

      <a href="index.html"
         class="btn btn-outline-secondary btn-lg">

        ←ホームへ戻る

      </a>

    </div>

  </main>

  <!-- フッター -->
  <footer class="fixed-bottom bg-success text-light text-end">

    <div>

      文教大学 情報学部 情報システム学科 プロジェクト演習BC

    </div>

  </footer>

  <script>

    function searchRequest(){

      const keyword =
        document.getElementById("keyword")
          .value
          .toLowerCase();

      const category =
        document.getElementById("category")
          .value;

      const cards =
        document.querySelectorAll(".request-card");

      cards.forEach(card => {

        const name =
          card.dataset.name.toLowerCase();

        const feature =
          card.dataset.feature.toLowerCase();

        const itemCategory =
          card.dataset.category;

        const keywordMatch =
          keyword === "" ||
          name.includes(keyword) ||
          feature.includes(keyword);

        const categoryMatch =
          category === "" ||
          itemCategory === category;

        if(keywordMatch && categoryMatch){

          card.style.display = "block";

        }else{

          card.style.display = "none";

        }

      });

    }

  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
