<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理者ログイン - 拾得物管理システム</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  </head>

  <body class="bg-light">

    <header>
      <nav class="navbar navbar-expand-lg bg-success navbar-dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="1.index.html">
            <i class="bi bi-search"></i> 拾得物管理システム
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                  拾得物登録機能
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#">拾得者（ユーザ）登録 <i class="bi bi-person"></i></a></li>
                  <li><a class="dropdown-item" href="register.html">拾得物登録 <i class="bi bi-file-earmark-arrow-up"></i></a></li>
                </ul>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <form action="7.administration_top.html" method="get">
        
        <div class="container mt-5 mb-5" style="max-width: 650px;">
          <div class="card shadow">

            <div class="card-header bg-primary text-white">
              <h2 class="mb-0">拾得物届出・管理システム</h2>
            </div>

            <div class="card-body p-5">

              <div class="mb-4">
                <label for="adminId" class="form-label fw-bold fs-4">
                  管理者ID
                </label>
                <input type="text" 
                       class="form-control form-control-lg bg-body-secondary border-secondary-subtle" 
                       id="adminId" 
                       style="border-radius: 8px;"
                       required>
              </div>

              <div class="mb-5">
                <label for="adminPassword" class="form-label fw-bold fs-4">
                  パスワード
                </label>
                <input type="password" 
                       class="form-control form-control-lg bg-body-secondary border-secondary-subtle" 
                       id="adminPassword" 
                       style="border-radius: 8px;"
                       required>
              </div>

              <div class="text-end">
                <button type="submit" class="btn btn-outline-dark btn-lg px-4" style="border-width: 2px;">
                  ログイン
                </button>
              </div>

            </div>

            <div class="card-footer bg-white border-top-0 text-end text-muted py-3 pe-4">
              <span class="fs-4">プロジェクト演習B</span>
            </div>

          </div>
        </div>

        <div class="container mb-5" style="max-width: 650px;">
          <a href="1.index.html" class="btn btn-outline-secondary btn-lg">
            ←戻る
          </a>
        </div>

      </form>
    </main>

    <footer class="fixed-bottom bg-success text-light text-end py-1 pe-3">
      <div><small>文教大学 情報学部 情報システム学科 プロジェクト演習BC</small></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
