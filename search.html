<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>拾得物管理システム</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  </head>

  <body>

    <!-- ヘッダー -->
    <header>

      <nav class="navbar navbar-expand-lg bg-success navbar-dark">

        <div class="container-fluid">

          <a class="navbar-brand" href="index.html">
            <i class="bi bi-search"></i>
            拾得物管理システム
          </a>

          <button class="navbar-toggler"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#navbarSupportedContent">

            <span class="navbar-toggler-icon"></span>

          </button>

          <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

              <!-- 拾得物登録 -->
              <li class="nav-item dropdown">

                <a class="nav-link dropdown-toggle"
                   href="#"
                   role="button"
                   data-bs-toggle="dropdown">

                  拾得物登録機能

                </a>

                <ul class="dropdown-menu">

                  <li>
                    <a class="dropdown-item" href="#">

                      拾得者（ユーザ）登録
                      <i class="bi bi-person"></i>

                    </a>
                  </li>

                  <li>
                    <a class="dropdown-item" href="#">

                      拾得物登録
                      <i class="bi bi-file-earmark-arrow-up"></i>

                    </a>
                  </li>

                </ul>

              </li>

              <!-- 検索 -->
              <li class="nav-item dropdown">

                <a class="nav-link dropdown-toggle"
                   href="#"
                   role="button"
                   data-bs-toggle="dropdown">

                  拾得物検索機能

                </a>

                <ul class="dropdown-menu">

                  <li>
                    <a class="dropdown-item" href="search.html">

                      拾得物検索
                      <i class="bi bi-search"></i>

                    </a>
                  </li>

                  <li>
                    <a class="dropdown-item" href="#">

                      遺失物捜索依頼
                      <i class="bi bi-file-earmark-check"></i>

                    </a>
                  </li>

                </ul>

              </li>

            </ul>

            <!-- ログイン -->
            <a href="#" class="btn btn-light ms-auto">

              <i class="bi bi-person-lock"></i>
              管理者ログイン

            </a>

          </div>

        </div>

      </nav>

    </header>

    <!-- メイン -->
    <main>

      <div class="container mt-4 mb-5">

        <!-- 見出し -->
        <h2 class="mb-4">

          <i class="bi bi-search me-2"></i>
          拾得物検索

        </h2>

        <!-- 検索フォーム -->
        <div class="card shadow-sm">

          <div class="card-body">

            <h4 class="card-title mb-4">

              検索条件

            </h4>

            <form action="search-result-list.html" method="get">

              <!-- キーワード検索 -->
              <div class="mb-4">

                <label class="form-label fw-bold">

                  キーワード検索

                </label>

                <div class="input-group">

                  <span class="input-group-text">

                    <i class="bi bi-search"></i>

                  </span>

                  <input
                    type="text"
                    name="keyword"
                    class="form-control"
                    placeholder="落とし物名・特徴を入力">

                </div>

              </div>

              <!-- 条件検索 -->
              <div class="mb-4">

                <label class="form-label fw-bold">

                  条件検索

                </label>

                <div class="row g-3">

                  <div class="col-md-3">

                    <select class="form-select" name="category">

                      <option value="">カテゴリー選択</option>
                      <option value="財布">財布</option>
                      <option value="スマートフォン">スマートフォン</option>
                      <option value="鍵">鍵</option>
                      <option value="その他">その他</option>

                    </select>

                  </div>

                </div>

              </div>

              <!-- 日付検索 -->
              <div class="mb-4">

                <label class="form-label fw-bold">

                  日付検索

                </label>

                <div class="row align-items-center">

                  <div class="col-md-5">

                    <input
                      type="date"
                      name="startDate"
                      class="form-control">

                  </div>

                  <div class="col-md-2 text-center">

                    ～

                  </div>

                  <div class="col-md-5">

                    <input
                      type="date"
                      name="endDate"
                      class="form-control">

                  </div>

                </div>

              </div>

              <!-- ボタン -->
              <div class="text-end">

                <button type="reset"
                        class="btn btn-secondary me-2">

                  リセット

                </button>

                <button type="submit"
                        class="btn btn-success">

                  <i class="bi bi-search me-1"></i>
                  検索する

                </button>

              </div>

            </form>

          </div>

        </div>

        <!-- 戻るボタン -->
        <div class="mt-4">

          <a href="index.html"
             class="btn btn-outline-success">

            <i class="bi bi-arrow-left-circle me-1"></i>
            トップページに戻る

          </a>

        </div>

      </div>

    </main>

    <!-- フッター -->
    <footer class="fixed-bottom bg-success text-light text-end">

      <div>
        文教大学 情報学部 情報システム学科 プロジェクト演習BC
      </div>

    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
