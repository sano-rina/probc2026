            <div class="col p-5 text-white rounded mt-3 bg-success">

                <p class="lead my-3">管理者IDとパスワードを入力してログインしてください。</p>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col p-5 rounded bg-light">
                <form style="max-width: 600px; margin: 0 auto;">
                    <div class="mb-4">
                        <label for="adminId" class="form-label fw-bold text-dark fs-5">管理者ID</label>
                        <input type="text" class="form-control form-control-lg rounded-3" id="adminId" style="background-color: #e5ffef; border: 2px solid #000;">
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold text-dark fs-5">パスワード</label>
                        <input type="password" class="form-control form-control-lg rounded-3" id="password" style="background-color: #e5ffef; border: 2px solid #000;">
                    </div>
                    
                    <div class="text-end">
                        <button type="submit" class="btn btn-lg fw-bold px-4" style="background-color: #e5ffef; border: 2px solid #000; color: #000;">ログイン</button>
                    </div>
                </form>
            </div>
