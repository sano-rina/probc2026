<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>拾得物管理システム</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  </head>

  <body>

    <!-- ヘッダー -->
    <header>
      <nav class="navbar navbar-expand-lg bg-success navbar-dark">
        <div class="container-fluid">

          <a class="navbar-brand" href="index.html">
            <i class="bi bi-search"></i> 拾得物管理システム
          </a>

          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <ul class="navbar-nav me-auto">

              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">拾得物登録機能</a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="15.user-registrantion.html">拾得者登録</a></li>
                  <li><a class="dropdown-item" href="3.item_registration.html">拾得物登録</a></li>
                </ul>
              </li>

              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">拾得物検索機能</a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="5.search.html">拾得物検索</a></li>
                  <li><a class="dropdown-item" href="13.lost_request.html">遺失物捜索依頼</a></li>
                </ul>
              </li>

            </ul>

            <a href="4.administrator_login.html" class="btn btn-light">
              管理者ログイン
            </a>

          </div>
        </div>
      </nav>
    </header>

    <!-- メイン -->
    <div class="container mt-4">

      <h2>拾得物検索</h2>

      <!-- 検索フォーム -->
      <form action="8.search-result-list.html" method="get">

        <div class="row g-3 mt-2">

          <div class="col-md-4">
            <label class="form-label">拾得物名</label>
            <input type="text" class="form-control" placeholder="例：財布">
          </div>

          <div class="col-md-4">
            <label class="form-label">カテゴリー</label>
            <select class="form-select">
              <option>選択してください</option>
              <option>財布</option>
              <option>スマートフォン</option>
              <option>鍵</option>
              <option>その他</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">拾得日</label>
            <input type="date" class="form-control">
          </div>

        </div>

        <!-- ボタン（右寄せ） -->
        <div class="mt-4 d-flex justify-content-end gap-2">

          <button type="submit" class="btn btn-primary">
            <i class="bi bi-search"></i> 検索
          </button>

          <button type="reset" class="btn btn-secondary">
            <i class="bi bi-arrow-clockwise"></i> リセット
          </button>

        </div>
        <tbody>

      </form>
<table class="table table-bordered table-hover text-center mt-4">

  <thead class="table-primary">
    <tr>
      <th>ID</th>
      <th>拾得物名</th>
      <th>カテゴリー</th>
      <th>拾得日</th>
      <th>状態</th>
    </tr>
  </thead>

  <tbody>
    {% for item in items %}
    <tr>
      <td>{{ item.id }}</td>
      <td>{{ item.item_name }}</td>
      <td>{{ item.category }}</td>
      <td>{{ item.found_date }}</td>
      <td>{{ item.status }}</td>
    </tr>
    {% endfor %}
  </tbody>

</table>
    </div>

    <!-- フッター -->
    <footer class="fixed-bottom bg-success text-light text-end">
      <div class="me-2">
        文教大学 情報学部 情報システム学科 プロジェクト演習BC
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
